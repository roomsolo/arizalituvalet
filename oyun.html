<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Oyun</title>
  <link href="/style2.css" rel="stylesheet">
  <style>
    body { margin: 0; }
    iframe {
      width: 99vw;
      height: 99vh;
      border: none;
    }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search)
    const url = params.get("url")
    document.body.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`
  </script>
</body>
</html>
